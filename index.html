<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Yield Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4CAF50;
            --primary-hover: #45a049;
            --bg-color: #1a1a2e;
            --container-bg: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --text-muted: #b0b0c0;
            --input-bg: rgba(0, 0, 0, 0.2);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #16213e 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .container {
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }

        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .accuracy {
            text-align: center;
            font-size: 0.9rem;
            color: #9be7a1;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input,
        select {
            width: 100%;
            padding: 0.7rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-color);
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(76, 175, 80, 0.15);
            border-left: 4px solid var(--primary);
            text-align: center;
            display: none;
        }

        .error {
            color: #ff6b6b;
            font-size: 0.8rem;
        }

        .loader {
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🌾 Crop Predictor</h1>
        <p class="subtitle">AI-powered yield estimation</p>
        <p style="text-align:center; color:#9be7a1; font-size:0.9rem;">
           Model Accuracy: ~91% (R² Score)
        </p>
        <div class="accuracy">Model Accuracy: ~91% (R² Score)</div>

        <form id="form">
            <div class="form-group">
                <label>Rainfall (50–300 mm)</label>
                <input type="number" id="rainfall" required>
                <div class="error" id="rainfall-error"></div>
            </div>

            <div class="form-group">
                <label>Temperature (15–40 °C)</label>
                <input type="number" id="temperature" required>
                <div class="error" id="temp-error"></div>
            </div>

            <div class="form-group">
                <label>Humidity (40–90 %)</label>
                <input type="number" id="humidity" required>
                <div class="error" id="humidity-error"></div>
            </div>

            <div class="form-group">
                <label>Soil Type</label>
                <select id="soil_type">
                    <option value="0">Clay</option>
                    <option value="1">Loamy</option>
                    <option value="2">Sandy</option>
                </select>
            </div>

            <button type="submit">Predict Yield</button>
        </form>

        <div class="loader" id="loader">Predicting...</div>

        <div class="result" id="result">
            Estimated Yield: <strong id="output"></strong> t/ha
        </div>
    </div>

    <script>
        const form = document.getElementById("form");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            let rainfall = parseFloat(document.getElementById("rainfall").value);
            let temp = parseFloat(document.getElementById("temperature").value);
            let humidity = parseFloat(document.getElementById("humidity").value);

            // Validation
            if (rainfall < 50 || rainfall > 300) return alert("Rainfall must be between 50–300");
            if (temp < 15 || temp > 40) return alert("Temperature must be between 15–40");
            if (humidity < 40 || humidity > 90) return alert("Humidity must be between 40–90");

            document.getElementById("loader").style.display = "block";

            const data = {
                rainfall: rainfall,
                temperature: temp,
                humidity: humidity,
                soil_type: parseInt(document.getElementById("soil_type").value)
            };

            const res = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            document.getElementById("loader").style.display = "none";
            document.getElementById("output").innerText = result.predicted_yield;
            document.getElementById("result").style.display = "block";
        });
    </script>

</body>
</html>
